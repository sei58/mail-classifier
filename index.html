<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우편물 분류 파트너 - 크롭 인식</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; touch-action: none; }
        .crop-overlay {
            position: absolute;
            border: 2px solid #3b82f6;
            background: rgba(59, 130, 246, 0.2);
            pointer-events: none;
            display: none;
            z-index: 50;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="p-6 text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-600 rounded-xl mb-3 shadow-lg shadow-blue-900/20">
            <i data-lucide="scan-text" class="text-white w-6 h-6"></i>
        </div>
        <h1 class="text-xl font-bold">영역 선택 분류기</h1>
        <p class="text-slate-500 text-xs mt-1">글자 부분을 드래그하여 인식하세요.</p>
    </header>

    <!-- Main Viewport -->
    <main class="flex-1 relative flex items-center justify-center bg-black">
        
        <!-- Camera View -->
        <video id="video" autoPlay playsInline class="absolute inset-0 w-full h-full object-cover opacity-60"></video>
        
        <!-- Instruction Overlay -->
        <div id="instruction" class="absolute top-4 left-1/2 -translate-x-1/2 bg-black/60 px-4 py-2 rounded-full text-[11px] font-medium border border-white/10 z-20">
            인식할 글자 위를 드래그하세요
        </div>

        <!-- Selection Canvas (Interaction Layer) -->
        <canvas id="interaction-canvas" class="absolute inset-0 w-full h-full z-30 cursor-crosshair"></canvas>
        
        <!-- Visual Crop Box -->
        <div id="crop-box" class="crop-overlay"></div>

        <!-- Processing UI -->
        <div id="state-processing" class="hidden absolute inset-0 z-40 bg-black/80 flex flex-col items-center justify-center text-center p-8">
            <div class="w-12 h-12 border-4 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-4"></div>
            <p class="font-bold">선택 영역 분석 중...</p>
        </div>

        <!-- Result Card -->
        <div id="state-result" class="hidden absolute bottom-0 left-0 right-0 z-50 bg-white text-slate-900 rounded-t-[2rem] p-8 animate-in slide-in-from-bottom duration-300">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <span id="res-dept" class="bg-blue-600 text-white text-[10px] font-black px-2.5 py-1 rounded-md uppercase mb-2 inline-block tracking-tighter">
                        부서명
                    </span>
                    <h2 id="res-sender" class="text-2xl font-bold leading-tight">발송처 정보</h2>
                </div>
                <button onclick="reset()" class="p-2 bg-slate-100 rounded-full text-slate-400">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <p id="res-summary" class="text-sm text-slate-500 mb-8 leading-relaxed italic border-l-2 border-slate-200 pl-4">
                요약 내용이 여기에 표시됩니다.
            </p>

            <div class="grid grid-cols-2 gap-3">
                <button onclick="sendEmail()" class="bg-slate-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i data-lucide="mail" class="w-4 h-4"></i> 알림 전송
                </button>
                <button onclick="reset()" class="bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> 다시 스캔
                </button>
            </div>
        </div>
    </main>

    <canvas id="crop-canvas" class="hidden"></canvas>

    <script>
        const apiKey = ""; // API 키 입력 필요
        const DEPARTMENTS = ['회계부', '인사부', '영업부', '총무부', 'IT지원팀'];

        const video = document.getElementById('video');
        const interactionCanvas = document.getElementById('interaction-canvas');
        const cropCanvas = document.getElementById('crop-canvas');
        const cropBox = document.getElementById('crop-box');
        const states = {
            processing: document.getElementById('state-processing'),
            result: document.getElementById('state-result'),
            instruction: document.getElementById('instruction')
        };

        let startX, startY, isDragging = false;
        let currentResult = null;

        lucide.createIcons();

        // 1. Camera Setup
        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;
                resizeCanvas();
            } catch (err) {
                alert("카메라를 켤 수 없습니다. HTTPS 환경인지 확인해주세요.");
            }
        }

        function resizeCanvas() {
            interactionCanvas.width = window.innerWidth;
            interactionCanvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);

        // 2. Drag Interaction
        interactionCanvas.addEventListener('mousedown', startDrag);
        interactionCanvas.addEventListener('touchstart', (e) => startDrag(e.touches[0]));

        window.addEventListener('mousemove', drag);
        window.addEventListener('touchmove', (e) => drag(e.touches[0]));

        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchend', endDrag);

        function startDrag(e) {
            if (currentResult) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            cropBox.style.display = 'block';
            cropBox.style.left = startX + 'px';
            cropBox.style.top = startY + 'px';
            cropBox.style.width = '0px';
            cropBox.style.height = '0px';
        }

        function drag(e) {
            if (!isDragging) return;
            const currentX = e.clientX;
            const currentY = e.clientY;
            
            const width = currentX - startX;
            const height = currentY - startY;

            cropBox.style.width = Math.abs(width) + 'px';
            cropBox.style.height = Math.abs(height) + 'px';
            cropBox.style.left = (width > 0 ? startX : currentX) + 'px';
            cropBox.style.top = (height > 0 ? startY : currentY) + 'px';
        }

        async function endDrag() {
            if (!isDragging) return;
            isDragging = false;
            
            const rect = cropBox.getBoundingClientRect();
            if (rect.width < 20 || rect.height < 20) {
                cropBox.style.display = 'none';
                return;
            }

            analyzeCrop(rect);
        }

        // 3. Image Analysis
        async function analyzeCrop(rect) {
            states.processing.classList.remove('hidden');
            states.instruction.classList.add('hidden');

            // 좌표 변환 (화면 좌표 -> 비디오 해상도 좌표)
            const scaleX = video.videoWidth / window.innerWidth;
            const scaleY = video.videoHeight / window.innerHeight;

            const ctx = cropCanvas.getContext('2d');
            cropCanvas.width = rect.width * scaleX;
            cropCanvas.height = rect.height * scaleY;

            ctx.drawImage(
                video, 
                rect.left * scaleX, rect.top * scaleY, rect.width * scaleX, rect.height * scaleY,
                0, 0, cropCanvas.width, cropCanvas.height
            );

            const base64Image = cropCanvas.toDataURL('image/png').split(',')[1];
            
            try {
                const prompt = `이 잘린 이미지 안의 글자를 읽어서 '발송처'를 파악해줘. 
                내용이 무엇인지 요약하고, 다음 부서 중 하나로 분류해: [${DEPARTMENTS.join(', ')}]. 
                결과는 반드시 JSON: {"sender": "이름", "summary": "요약", "department": "부서"}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/png", data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                const jsonMatch = text.match(/\{.*\}/s);

                if (jsonMatch) {
                    currentResult = JSON.parse(jsonMatch[0]);
                    showResult(currentResult);
                } else {
                    throw new Error("인식 실패");
                }
            } catch (err) {
                alert("분석에 실패했습니다. API 키를 확인하거나 다시 시도해주세요.");
                reset();
            } finally {
                states.processing.classList.add('hidden');
            }
        }

        function showResult(res) {
            document.getElementById('res-sender').innerText = res.sender;
            document.getElementById('res-dept').innerText = res.department;
            document.getElementById('res-summary').innerText = res.summary;
            states.result.classList.remove('hidden');
            cropBox.style.borderColor = '#10b981'; // Success green
            cropBox.style.background = 'transparent';
        }

        function sendEmail() {
            const sub = encodeURIComponent(`[우편물] ${currentResult.sender} 도착`);
            const body = encodeURIComponent(`${currentResult.department} 담당자님,\n\n${currentResult.sender}에서 온 우편물이 분류되었습니다.\n\n요약: ${currentResult.summary}`);
            window.location.href = `mailto:office@company.com?subject=${sub}&body=${body}`;
        }

        function reset() {
            currentResult = null;
            states.result.classList.add('hidden');
            states.instruction.classList.remove('hidden');
            cropBox.style.display = 'none';
            cropBox.style.borderColor = '#3b82f6';
            cropBox.style.background = 'rgba(59, 130, 246, 0.2)';
        }

        init();
    </script>
</body>
</html>
